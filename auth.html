<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入或註冊｜Meeting Recorder</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #326bff; --primary2: #6e45ff; --bg: #f7f9fc; --ink: #121826; --muted: #6b7280; --danger: #dc2626; }
    body { font-family: 'Noto Sans TC', sans-serif; color: var(--ink); background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    a { text-decoration: none; color: var(--primary); }
    .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 32px; display: block; }
    .logo span { color: var(--primary2); }

    .auth-card {
      background: #fff; border-radius: 24px; padding: 40px 36px;
      width: 100%; max-width: 420px; box-shadow: 0 16px 60px rgba(15,23,42,0.12);
    }

    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 2px solid #e2e8f0; }
    .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 15px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--ink); outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--primary); }
    .form-group input.error { border-color: var(--danger); }

    .btn-submit {
      width: 100%; padding: 13px; background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px; font-family: inherit; transition: opacity 0.2s;
      box-shadow: 0 4px 16px rgba(50,107,255,0.3);
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }

    .success-msg { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .success-msg.show { display: block; }

    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .back-link:hover { color: var(--ink); }

    .plan-hint { background: rgba(50,107,255,0.06); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--muted); margin-top: 16px; text-align: center; display: none; }
    .plan-hint.show { display: block; }
  </style>
</head>
<body>

<div class="auth-card">
  <a href="/" class="logo">Meeting<span>Recorder</span></a>

  <div class="tabs">
    <div class="tab active" data-tab="login">登入</div>
    <div class="tab" data-tab="register">註冊</div>
  </div>

  <div id="error-msg" class="error-msg"></div>
  <div id="success-msg" class="success-msg"></div>

  <!-- Login form -->
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="login-password" placeholder="輸入密碼" required>
    </div>
    <button type="submit" class="btn-submit" id="login-btn">登入</button>
  </form>

  <!-- Register form -->
  <form id="register-form" style="display:none;">
    <div class="form-group">
      <label>名稱</label>
      <input type="text" id="reg-name" placeholder="你的名字（選填）">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="reg-password" placeholder="至少 6 位數" required minlength="6">
    </div>
    <button type="submit" class="btn-submit" id="reg-btn">建立帳戶</button>
  </form>

  <div id="plan-hint" class="plan-hint"></div>

  <a href="/" class="back-link">← 返回首頁</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const planHint = document.getElementById('plan-hint');
  const plan = params.get('plan');
  if (plan && plan !== 'free') {
    const names = { pro: 'Pro', business: 'Business' };
    planHint.textContent = `即將訂閱 ${names[plan] || plan} 方案（可在帳戶設定中變更）`;
    planHint.classList.add('show');
  }

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const isLogin = tab.dataset.tab === 'login';
      document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
      document.getElementById('register-form').style.display = isLogin ? 'none' : 'block';
      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('success-msg').classList.remove('show');
    });
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  // Login
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = '登入中...';
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '登入失敗');
      showSuccess('登入成功！正在跳轉...');
      setTimeout(() => window.location.href = '/app', 800);
    } catch(err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = '登入';
    }
  });

  // Register
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    btn.textContent = '建立帳戶中...';
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, name }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '註冊失敗');
      showSuccess('帳戶建立成功！正在跳轉...');
      setTimeout(() => window.location.href = '/app', 800);
    } catch(err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = '建立帳戶';
    }
  });

  // Check if already logged in
  (async () => {
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (res.ok) window.location.href = '/app';
    } catch {}
  })();
</script>

</body>
</html>
