<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入或註冊｜Meeting Recorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a12;
      --bg-2:        #0f0f1a;
      --surface:     #13131f;
      --surface-2:   #191928;
      --card:        rgba(255,255,255,0.03);
      --card-hover:  rgba(255,255,255,0.06);
      --border:        rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.13);
      --text:       #e2e8f0;
      --text-2:     rgba(226,232,240,0.60);
      --text-muted: rgba(226,232,240,0.38);
      --primary:       #a78bfa;
      --primary-2:     #7c3aed;
      --primary-3:     #8b5cf6;
      --primary-dim:   rgba(139,92,246,0.12);
      --primary-glow:  rgba(139,92,246,0.20);
      --primary-light: #c4b5fd;
      --accent:       #34d399;
      --accent-2:     #10b981;
      --accent-dim:   rgba(52,211,153,0.10);
      --accent-glow:  rgba(52,211,153,0.14);
      --warn:        #fb923c;
      --warn-dim:    rgba(251,146,60,0.10);
      --danger:      #f87171;
      --danger-dim:  rgba(248,113,113,0.10);
      --danger-glow: rgba(248,113,113,0.20);
      --font: 'Inter', 'Noto Sans TC', sans-serif;
      --radius:    22px;
      --radius-sm: 14px;
      --radius-xs: 8px;
      --shadow:    0 16px 56px rgba(0,0,0,0.55);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(139,92,246,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(52,211,153,0.06) 0%, transparent 55%);
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }

    /* ─── Auth Card ─── */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow), var(--glow-purple);
      position: relative;
      z-index: 1;
    }

    /* ─── Logo ─── */
    .logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 36px;
      display: block;
      background: linear-gradient(135deg, #c4b5fd 0%, #a78bfa 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { opacity: 0.4; }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      background: var(--bg-2);
      border-radius: var(--radius-xs);
      padding: 4px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      user-select: none;
    }
    .tab.active {
      color: #fff;
      background: linear-gradient(135deg, var(--primary-3), var(--primary-2));
      box-shadow: 0 2px 12px rgba(139,92,246,0.35);
    }

    /* ─── Alerts ─── */
    .error-msg, .success-msg {
      padding: 11px 14px;
      border-radius: var(--radius-xs);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }
    .error-msg.show { display: block; }
    .error-msg { background: var(--danger-dim); border: 1px solid rgba(248,113,113,0.25); color: var(--danger); }
    .success-msg.show { display: block; }
    .success-msg { background: var(--accent-dim); border: 1px solid rgba(52,211,153,0.2); color: var(--accent); }

    /* ─── Forms ─── */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 7px;
      color: var(--text-2);
      letter-spacing: 0.02em;
    }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      background: var(--bg-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xs);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: var(--text-muted); }
    .form-group input:focus {
      border-color: var(--primary-3);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }
    .form-group input.error { border-color: var(--danger); }

    /* ─── Submit Button ─── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-xs);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(139,92,246,0.3);
    }
    .btn-submit:hover {
      opacity: 0.9;
      box-shadow: 0 6px 24px rgba(139,92,246,0.4);
    }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── Plan hint ─── */
    .plan-hint {
      background: var(--primary-dim);
      border-radius: var(--radius-xs);
      padding: 11px 14px;
      font-size: 12px;
      color: var(--primary-light);
      margin-top: 16px;
      text-align: center;
      display: none;
      border: 1px solid rgba(139,92,246,0.15);
    }
    .plan-hint.show { display: block; }

    /* ─── Back link ─── */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--primary-light); }

    /* ─── Decorative glow ─── */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb-1 {
      width: 400px; height: 400px;
      top: -100px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
    }
  </style>
</head>
<body>

<div class="glow-orb glow-orb-1"></div>

<div class="auth-card">
  <a href="/" class="logo">Meeting<span>Recorder</span></a>

  <div class="tabs">
    <div class="tab active" data-tab="login">登入</div>
    <div class="tab" data-tab="register">註冊</div>
  </div>

  <div id="error-msg" class="error-msg"></div>
  <div id="success-msg" class="success-msg"></div>

  <!-- Login form -->
  <form id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="login-password" placeholder="輸入密碼" required>
    </div>
    <button type="submit" class="btn-submit" id="login-btn">登入</button>
  </form>

  <!-- Register form -->
  <form id="register-form" style="display:none;">
    <div class="form-group">
      <label>名稱</label>
      <input type="text" id="reg-name" placeholder="你的名字（選填）">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="reg-password" placeholder="至少 6 位數" required minlength="6">
    </div>
    <button type="submit" class="btn-submit" id="reg-btn">建立帳戶</button>
  </form>

  <div id="plan-hint" class="plan-hint"></div>

  <a href="/" class="back-link">← 返回首頁</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const planHint = document.getElementById('plan-hint');
  const plan = params.get('plan');
  if (plan && plan !== 'free') {
    const names = { pro: 'Pro', business: 'Business' };
    planHint.textContent = `即將訂閱 ${names[plan] || plan} 方案（可在帳戶設定中變更）`;
    planHint.classList.add('show');
  }

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const isLogin = tab.dataset.tab === 'login';
      document.getElementById('login-form').style.display = isLogin ? 'block' : 'none';
      document.getElementById('register-form').style.display = isLogin ? 'none' : 'block';
      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('success-msg').classList.remove('show');
    });
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  // Login
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = '登入中...';
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '登入失敗');
      showSuccess('登入成功！正在跳轉...');
      setTimeout(() => window.location.href = '/app', 800);
    } catch(err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = '登入';
    }
  });

  // Register
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.disabled = true;
    btn.textContent = '建立帳戶中...';
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, name }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '註冊失敗');
      showSuccess('帳戶建立成功！正在跳轉...');
      setTimeout(() => window.location.href = '/app', 800);
    } catch(err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = '建立帳戶';
    }
  });

  // Check if already logged in
  (async () => {
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (res.ok) window.location.href = '/app';
    } catch {}
  })();
</script>

</body>
</html>
