<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用量儀表板｜Meeting Recorder</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #a78bfa;
      --primary2: #8b5cf6;
      --accent: #34d399;
      --warn: #fb923c;
      --danger: #f87171;
      --bg: #000000;
      --bg-2: #050508;
      --ink: #ffffff;
      --muted: rgba(255,255,255,0.45);
      --card: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.08);
    }
    body { font-family: 'Noto Sans TC', sans-serif; color: var(--ink); background: var(--bg); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .topbar {
      background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--line);
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
      height: 60px; position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px);
    }
    .logo { font-size: 18px; font-weight: 800; color: var(--primary); }
    .logo span { color: var(--primary2); }
    .topbar-links { display: flex; gap: 24px; align-items: center; }
    .topbar-links a { font-size: 14px; color: var(--muted); font-weight: 500; transition: color 0.2s; }
    .topbar-links a:hover { color: var(--ink); }
    .topbar-links a.active { color: var(--primary); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 14px; font-weight: 600; color: var(--ink); }
    .btn-outline {
      padding: 7px 16px; border: 1.5px solid var(--line); border-radius: 8px;
      font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer;
      background: none; font-family: inherit; transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: var(--danger); color: var(--danger); }

    .page { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

    .page-title { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
    .page-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--line); backdrop-filter: blur(16px); }
    .stat-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--ink); }
    .stat-unit { font-size: 13px; font-weight: 500; color: var(--muted); }
    .stat-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary2), var(--primary)); transition: width 0.6s ease; }
    .stat-bar-fill.warn { background: linear-gradient(90deg, var(--warn), #f97316); }
    .stat-bar-fill.danger { background: linear-gradient(90deg, var(--danger), #ef4444); }

    /* Usage section */
    .card { background: var(--card); border-radius: 20px; padding: 24px; border: 1px solid var(--line); margin-bottom: 20px; backdrop-filter: blur(16px); }
    .card-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .plan-badge { display: inline-block; padding: 4px 12px; background: linear-gradient(135deg, var(--primary2), var(--primary)); color: #000; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Job history */
    .job-list { list-style: none; }
    .job-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); gap: 16px; }
    .job-item:last-child { border-bottom: none; }
    .job-title { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-meta { font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .job-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
    .job-status.completed { background: rgba(52,211,153,0.15); color: #34d399; }
    .job-status.processing { background: rgba(167,139,250,0.15); color: var(--primary); }
    .job-status.failed { background: rgba(248,113,113,0.15); color: var(--danger); }
    .job-empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }

    /* Progress circle */
    .quota-visual { display: flex; align-items: center; gap: 32px; }
    .quota-circle { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
    .quota-circle svg { transform: rotate(-90deg); }
    .quota-circle-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 8; }
    .quota-circle-fill { fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
    .quota-circle-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .quota-circle-num { font-size: 20px; font-weight: 800; line-height: 1; }
    .quota-circle-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .quota-details { flex: 1; }
    .quota-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .quota-row .label { color: var(--muted); }
    .quota-row .value { font-weight: 600; }

    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .auth-required { text-align: center; padding: 80px 20px; }
    .auth-required h2 { font-size: 22px; margin-bottom: 12px; }
    .auth-required p { color: var(--muted); margin-bottom: 20px; }
    .btn-primary {
      display: inline-block; padding: 12px 28px;
      background: linear-gradient(135deg, var(--primary2), var(--primary));
      color: #000; border-radius: 10px; font-size: 15px; font-weight: 700;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(139,92,246,0.3); }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .quota-visual { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="logo">Meeting<span>Recorder</span></a>
  <div class="topbar-links">
    <a href="/app">錄音工作台</a>
    <a href="/dashboard" class="active">使用量</a>
    <a href="/app/api-keys">API Key</a>
  </div>
  <div class="topbar-right">
    <span class="user-name" id="user-name">載入中...</span>
    <button class="btn-outline" id="logout-btn">登出</button>
  </div>
</div>

<div class="page">
  <h1 class="page-title">使用量儀表板</h1>
  <p class="page-subtitle" id="period-label">本月份使用量</p>

  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">已用量（分鐘）</div>
      <div class="stat-value" id="stat-minutes">—</div>
      <div class="stat-unit" id="stat-minutes-limit">/ 60 分鐘</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="stat-bar-minutes" style="width:0%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">已完成任務</div>
      <div class="stat-value" id="stat-jobs">—</div>
      <div class="stat-unit">次轉寫</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">剩餘分鐘</div>
      <div class="stat-value" id="stat-remaining">—</div>
      <div class="stat-unit" id="stat-remaining-label">分鐘</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">目前方案</div>
      <div class="stat-value" id="stat-plan" style="font-size:20px;">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      本月用量配額
      <span class="plan-badge" id="card-plan-badge">FREE</span>
    </div>
    <div class="quota-visual">
      <div class="quota-circle">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="quota-circle-bg" cx="50" cy="50" r="42"/>
          <circle class="quota-circle-fill" id="quota-circle" cx="50" cy="50" r="42"
            stroke-dasharray="264" stroke-dashoffset="264"/>
        </svg>
        <div class="quota-circle-text">
          <span class="quota-circle-num" id="quota-pct">0%</span>
          <span class="quota-circle-label">已用</span>
        </div>
      </div>
      <div class="quota-details">
        <div class="quota-row"><span class="label">方案</span><span class="value" id="quota-plan">—</span></div>
        <div class="quota-row"><span class="label">每月配額</span><span class="value" id="quota-limit">—</span></div>
        <div class="quota-row"><span class="label">已使用</span><span class="value" id="quota-used">—</span></div>
        <div class="quota-row"><span class="label">剩餘</span><span class="value" id="quota-remaining">—</span></div>
        <div class="quota-row"><span class="label">累計任務</span><span class="value" id="quota-jobs">—</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">最近任務</div>
    <ul class="job-list" id="job-list">
      <li class="job-empty">載入中...</li>
    </ul>
  </div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 42; // ≈ 264

  async function loadData() {
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (!res.ok) { window.location.href = '/auth'; return; }
      const { user } = await res.json();
      document.getElementById('user-name').textContent = user.name || user.email;

      const usageRes = await fetch('/api/user/usage', { credentials: 'include' });
      if (!usageRes.ok) return;
      const usage = await usageRes.json();

      const { plan, limit_minutes, used_minutes, remaining_minutes, total_jobs, recent_jobs } = usage;
      const planNames = { free: 'Free', pro: 'Pro', business: 'Business' };
      const pct = Math.min(100, Math.round((used_minutes / limit_minutes) * 100));

      // Stats
      document.getElementById('stat-minutes').textContent = used_minutes.toFixed(1);
      document.getElementById('stat-minutes-limit').textContent = `/ ${limit_minutes} 分鐘`;
      document.getElementById('stat-jobs').textContent = total_jobs;
      document.getElementById('stat-remaining').textContent = Math.max(0, remaining_minutes).toFixed(1);
      document.getElementById('stat-plan').textContent = planNames[plan] || plan.toUpperCase();

      // Progress bar
      const bar = document.getElementById('stat-bar-minutes');
      bar.style.width = pct + '%';
      if (pct > 80) bar.classList.add('danger');
      else if (pct > 50) bar.classList.add('warn');

      // Circle
      const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;
      document.getElementById('quota-circle').style.strokeDashoffset = offset;
      document.getElementById('quota-circle').style.stroke = pct > 80 ? 'var(--danger)' : pct > 50 ? 'var(--warn)' : 'var(--primary)';
      document.getElementById('quota-pct').textContent = pct + '%';
      document.getElementById('card-plan-badge').textContent = (planNames[plan] || plan).toUpperCase();
      document.getElementById('quota-plan').textContent = planNames[plan] || plan;
      document.getElementById('quota-limit').textContent = limit_minutes + ' 分鐘';
      document.getElementById('quota-used').textContent = used_minutes.toFixed(1) + ' 分鐘';
      document.getElementById('quota-remaining').textContent = Math.max(0, remaining_minutes).toFixed(1) + ' 分鐘';
      document.getElementById('quota-jobs').textContent = total_jobs + ' 筆';

      // Job list
      const list = document.getElementById('job-list');
      if (!recent_jobs || recent_jobs.length === 0) {
        list.innerHTML = '<li class="job-empty">尚無記錄，上傳第一個錄音吧！</li>';
      } else {
        list.innerHTML = recent_jobs.map(job => {
          const date = new Date(job.created_at).toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
          return `<li class="job-item">
            <span class="job-title">${job.meeting_title || '未命名會議'}</span>
            <span class="job-meta">${job.minutes?.toFixed(1) || '?'} 分鐘</span>
            <span class="job-meta">${date}</span>
            <span class="job-status ${job.status}">${job.status === 'completed' ? '完成' : job.status === 'processing' ? '處理中' : '失敗'}</span>
          </li>`;
        }).join('');
      }

    } catch(err) {
      console.error(err);
    }
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/';
  });

  loadData();
</script>

</body>
</html>
