<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唯讀分享｜Meeting Recorder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#000; --card:rgba(255,255,255,0.035); --border:rgba(255,255,255,0.08); --text:#f4f4f5; --text-2:rgba(244,244,245,0.58); --sol-1:#ff9317; --sol-3:#ec4899; --sol-4:#a855f7; --radius:20px;
    }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
    .wrap { max-width: 920px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 18px; backdrop-filter: blur(18px); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    h1 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(135deg, var(--sol-1), var(--sol-3), var(--sol-4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .meta { color: var(--text-2); font-size: 13px; margin-bottom: 18px; }
    .label { font-size: 12px; color: var(--text-2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; line-height: 1.75; font-size: 13px; color: var(--text); }
    .empty { color: var(--text-2); text-align: center; padding: 50px 0; }
    a { color: #c4b5fd; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 12px; font-size: 13px; font-weight: 700;
      border: 1.5px solid rgba(255,255,255,0.13); background: rgba(255,255,255,0.05);
      color: var(--text-2); cursor: pointer; text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      font-family: inherit;
    }
    .btn:hover { border-color: var(--sol-4); color: #c084fc; background: rgba(168,85,247,0.08); }
    .btn.primary {
      background: linear-gradient(135deg, var(--sol-1), var(--sol-3));
      color: #fff; border: none;
      box-shadow: 0 2px 10px rgba(249,115,22,0.28);
    }
    .btn.primary:hover { opacity: 0.88; }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.10);
      border-top-color: var(--sol-3);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row { display: flex; align-items: center; gap: 12px; color: var(--text-2); font-size: 14px; padding: 20px 0; justify-content: center; }
    .error-row { color: #f87171; font-size: 13px; padding: 16px 0; text-align: center; }
    .share-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-header">
        <div>
          <h1 id="title">載入中...</h1>
          <div class="meta" id="meta"></div>
        </div>
        <div class="share-actions" id="share-actions" style="display:none;">
          <button class="btn primary" id="btn-export-md">📄 匯出 Markdown</button>
          <button class="btn" id="btn-copy-link">🔗 複製連結</button>
        </div>
      </div>
      <div class="empty" id="empty">找不到分享內容，請回到工作台重新產生連結。</div>
    </div>

    <div class="card" id="summary-card" style="display:none;">
      <div class="label">會議摘要</div>
      <pre id="summary"></pre>
    </div>
    <div class="card" id="transcript-card" style="display:none;">
      <div class="label">逐字稿</div>
      <pre id="transcript"></pre>
    </div>
  </div>

  <script>
    // ── Share page data ──
    // URL format: /share.html#<id>?d=<encoded>
    const hashRaw = (location.hash || '').replace('#', '');
    const hashParts = hashRaw.split('?');
    const shareId = hashParts[0] || '';
    const params = new URLSearchParams(hashParts[1] || '');
    const dParam = params.get('d');
    const localStore = JSON.parse(localStorage.getItem('mr_shared_notes') || '{}');

    let pageData = null;  // holds the loaded share record

    // ── Decode base64-padded payload ──
    function decodePayload(encoded) {
      const padded = encoded.replace(/-/g, '+').replace(/_/g, '/');
      const base = padded + '='.repeat((4 - padded.length % 4) % 4);
      return JSON.parse(decodeURIComponent(escape(atob(base))));
    }

    // ── Apply data to DOM ──
    function applyData(data) {
      if (!data) return false;
      pageData = data;
      document.getElementById('title').textContent = data.title || '未命名會議';
      document.getElementById('meta').textContent =
        (data.participants || '') + ' ・ ' + new Date(data.created_at || data.createdAt || Date.now()).toLocaleString('zh-TW');
      document.getElementById('empty').style.display = 'none';
      if (data.summary) {
        document.getElementById('summary-card').style.display = 'block';
        document.getElementById('summary').textContent = data.summary;
      }
      if (data.transcript) {
        document.getElementById('transcript-card').style.display = 'block';
        document.getElementById('transcript').textContent = data.transcript;
      }
      if (data.shareId || shareId) {
        document.getElementById('share-actions').style.display = 'flex';
      }
      return true;
    }

    // ── Build meeting Markdown for export ──
    function buildMeetingMarkdown(data) {
      const title = data.title || '未命名會議';
      const participants = data.participants || '未填寫';
      const transcript = data.transcript || '';
      const summary = data.summary || '';
      const date = new Date(data.created_at || data.createdAt || Date.now()).toLocaleDateString('zh-TW');
      let md = '# ' + title + '｜Meeting Minutes\n\n';
      md += '> 與會人員：' + participants + ' | 記錄日期：' + date + '\n\n';
      md += '---\n\n';
      md += '## 會議紀要\n\n' + (summary || '(無)') + '\n\n';
      md += '---\n\n## 逐字稿\n\n' + (transcript || '(無)') + '\n';
      return md;
    }

    // ── Export Markdown ──
    function exportMarkdown(data) {
      const md = buildMeetingMarkdown(data);
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (data.title || '未命名會議').replace(/[^\w\u4e00-\u9fa5]/g, '_') + '_會議紀要.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Wire up buttons ──
    document.getElementById('btn-export-md').addEventListener('click', function() {
      if (pageData) exportMarkdown(pageData);
    });

    document.getElementById('btn-copy-link').addEventListener('click', function() {
      navigator.clipboard.writeText(location.href).then(function() {
        const btn = document.getElementById('btn-copy-link');
        btn.textContent = '已複製!';
        setTimeout(function() { btn.textContent = '🔗 複製連結'; }, 1500);
      });
    });

    // ── Try to load from URL param first (base64 encoded inline) ──
    if (dParam) {
      try {
        const decoded = decodePayload(dParam);
        if (applyData(decoded)) {
          // Successfully loaded from URL param
        }
      } catch(e) {
        document.getElementById('title').textContent = '唯讀分享';
        console.error('Failed to decode share payload:', e);
      }
    }

    // ── Fallback: try localStorage ──
    if (!pageData && localStore[shareId]) {
      applyData(localStore[shareId]);
    }

    // ── Final fallback: call /api/share/{shareId} ──
    if (!pageData && shareId) {
      const wrap = document.querySelector('.card');
      // Show loading indicator
      const loadingEl = document.createElement('div');
      loadingEl.className = 'loading-row';
      loadingEl.id = 'api-loading';
      loadingEl.innerHTML = '<div class="spinner"></div><span>從伺服器載入分享內容...</span>';
      wrap.appendChild(loadingEl);

      fetch('/api/share/' + encodeURIComponent(shareId), { credentials: 'include' })
        .then(function(res) {
          if (!res.ok) {
            if (res.status === 404) {
              document.getElementById('title').textContent = '唯讀分享';
              document.getElementById('empty').style.display = 'block';
              document.getElementById('empty').textContent = '找不到這個分享連結，請確認連結是否正確，或回到工作台重新產生分享。';
            }
            return null;
          }
          return res.json();
        })
        .then(function(data) {
          if (data) applyData(data);
        })
        .catch(function(e) {
          document.getElementById('title').textContent = '唯讀分享';
          console.error('Failed to fetch share:', e);
        })
        .finally(function() {
          const el = document.getElementById('api-loading');
          if (el) el.remove();
        });
    }

    // ── If no shareId at all ──
    if (!shareId && !dParam) {
      document.getElementById('title').textContent = '唯讀分享';
    }
  </script>
</body>
</html>
