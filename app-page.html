<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會議工作台｜Meeting Recorder</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ══════════════════════════════════════════════════════════════
       SOLANA.COM AUTHENTIC STYLE — Meeting Recorder v3
       Key: Black canvas + Solana sunset gradient (orange→pink→purple)
    ══════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #000;
      --bg-2:         #050505;
      --surface:      #0c0c0c;
      --surface-2:    #111;
      --card:         rgba(255,255,255,0.035);
      --card-hover:   rgba(255,255,255,0.06);
      --border:       rgba(255,255,255,0.07);
      --border-bright:rgba(255,255,255,0.13);
      --text:         #f0f0f5;
      --text-2:       rgba(240,240,245,0.50);
      --text-muted:   rgba(240,240,245,0.28);

      /* Solana sunset brand (authentic) */
      --sol-1: #ff9317;   /* orange */
      --sol-2: #f97316;   /* orange-red */
      --sol-3: #ec4899;   /* pink */
      --sol-4: #a855f7;   /* purple */
      --sol-glow: rgba(249,115,22,0.18);
      --sol-glow2: rgba(168,85,247,0.14);

      /* accent */
      --accent: #22d3ee;
      --accent-dim: rgba(34,211,238,0.08);

      --font: 'Space Grotesk', 'Noto Sans TC', system-ui, sans-serif;
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── Background atmosphere ── */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100vw; height: 600px;
      background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(249,115,22,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; right: -20%;
      width: 60vw; height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Topbar ── */
    .topbar {
      background: rgba(0,0,0,0.88);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
      position: sticky; top: 0; z-index: 200;
      backdrop-filter: blur(24px);
    }
    .logo {
      font-size: 20px; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--sol-1), var(--sol-3), var(--sol-4));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub { opacity: 0.35; }
    .topbar-links { display: flex; gap: 4px; }
    .topbar-links a {
      font-size: 13px; color: var(--text-2); font-weight: 600;
      padding: 6px 14px; border-radius: var(--radius-xs);
      transition: color 0.15s, background 0.15s;
    }
    .topbar-links a:hover { color: var(--text); background: var(--card); }
    .topbar-links a.active { color: #fb923c; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-pill {
      background: linear-gradient(135deg, var(--sol-2), var(--sol-3), var(--sol-4));
      color: #fff; padding: 5px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
    }
    .btn-outline-sm {
      padding: 5px 13px;
      border: 1.5px solid var(--border-bright);
      border-radius: var(--radius-xs);
      font-size: 12px; font-weight: 600;
      color: var(--text-2); background: none; cursor: pointer; font-family: inherit;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline-sm:hover { border-color: #f87171; color: #f87171; }

    /* ── Shell ── */
    .shell { max-width: 1180px; margin: 0 auto; padding: 36px 20px 80px; position: relative; z-index: 1; }

    /* ── Alert banners ── */
    .alert-banner {
      border-radius: var(--radius-sm); padding: 13px 18px;
      font-size: 13px; margin-bottom: 16px;
      display: none; align-items: center; gap: 10px;
    }
    .alert-banner.show { display: flex; }
    .alert-banner.no-key {
      background: rgba(249,115,22,0.08);
      border: 1px solid rgba(249,115,22,0.22);
      color: rgba(255,255,255,0.75);
    }
    .alert-banner a { color: #fb923c; font-weight: 700; }

    /* ── Grid ── */
    .hero { display: grid; grid-template-columns: 1.35fr .9fr; gap: 18px; margin-bottom: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 30px;
      backdrop-filter: blur(20px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .card:hover { border-color: rgba(168,85,247,0.15); }

    /* ── Section label ── */
    .section-label {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .15em; color: #fb923c; margin-bottom: 12px; display: block;
    }

    /* ── Info fields ── */
    .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .info-field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-muted); margin-bottom: 5px;
    }
    .info-field input {
      width: 100%; padding: 10px 13px;
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-xs);
      font-size: 13px; font-family: var(--font);
      color: var(--text); background: rgba(255,255,255,0.04);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .info-field input:focus {
      border-color: var(--sol-3);
      box-shadow: 0 0 0 3px rgba(236,72,153,0.12);
    }
    .info-field input::placeholder { color: var(--text-muted); }

    /* ── Recorder ── */
    .recorder-body { display: flex; flex-direction: column; align-items: center; padding: 18px 0; }
    .waveform {
      width: 100%; height: 64px;
      display: flex; align-items: center; justify-content: center; gap: 3px; margin-bottom: 16px;
    }
    .wave-bar {
      width: 4px; height: 20px;
      background: rgba(255,255,255,0.08); border-radius: 2px;
      transition: height 0.1s, background 0.1s;
    }
    .wave-bar.active {
      background: linear-gradient(to top, var(--sol-1), var(--sol-3));
    }
    .timer {
      font-size: 40px; font-weight: 800; color: var(--text);
      font-variant-numeric: tabular-nums; margin-bottom: 18px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0f0f5, #fb923c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .timer.recording {
      background: linear-gradient(135deg, #f87171, #f97316);
      -webkit-background-clip: text;
      animation: timer-pulse 1s ease-in-out infinite;
    }
    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .recorder-controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn-rec {
      padding: 12px 28px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
      border: none; transition: all 0.2s;
    }
    .btn-rec.start {
      background: linear-gradient(135deg, var(--sol-1), var(--sol-2), var(--sol-3));
      color: #fff;
      box-shadow: 0 4px 20px rgba(249,115,22,0.35), 0 0 0 0 rgba(249,115,22,0.2);
    }
    .btn-rec.start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(249,115,22,0.50), 0 0 0 1px rgba(249,115,22,0.2);
    }
    .btn-rec.stop {
      background: linear-gradient(135deg, #f87171, #f97316);
      color: #fff;
      box-shadow: 0 4px 16px rgba(248,113,113,0.3);
    }
    .btn-rec.stop:hover { transform: translateY(-1px); }
    .btn-rec.upload {
      background: var(--card); color: var(--text-2);
      border: 1px solid var(--border-bright);
    }
    .btn-rec.upload:hover {
      border-color: var(--sol-4); color: #c084fc;
      background: rgba(168,85,247,0.08);
    }
    .btn-rec:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    .upload-area { width: 100%; margin-top: 14px; display: none; }
    .upload-area.show { display: block; }
    .upload-area label {
      display: block; cursor: pointer; padding: 20px;
      border: 2px dashed var(--border-bright); border-radius: var(--radius-sm);
      text-align: center; font-size: 13px; color: var(--text-muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .upload-area label:hover { border-color: var(--sol-4); color: #c084fc; }
    .upload-area input { display: none; }
    .upload-filename { margin-top: 8px; font-size: 12px; color: #34d399; font-weight: 600; }

    /* ── Status bar ── */
    .status-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 20px; margin-bottom: 18px;
      display: none; align-items: center; gap: 12px;
      backdrop-filter: blur(20px);
    }
    .status-bar.show { display: flex; }
    .status-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.10);
      border-top-color: var(--sol-3);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { font-size: 13px; color: var(--text-muted); flex: 1; }
    .status-progress { font-size: 13px; font-weight: 700; color: #fb923c; }
    .progress-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--sol-1), var(--sol-3), var(--sol-4));
      border-radius: 3px; transition: width 0.4s;
    }

    /* ── Bottom grid ── */
    .bottom-grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 18px; margin-bottom: 18px; }
    .transcript-area, .history-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 30px;
      backdrop-filter: blur(20px);
      transition: border-color 0.25s;
    }
    .transcript-area:hover, .history-card:hover { border-color: rgba(168,85,247,0.15); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-header h2 { font-size: 16px; font-weight: 800; color: var(--text); }
    .section-header-actions { display: flex; gap: 8px; }
    .btn-sm {
      padding: 6px 14px; border-radius: var(--radius-xs);
      font-size: 12px; font-weight: 700;
      border: 1px solid var(--border-bright);
      background: var(--card); color: var(--text-2); cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--sol-4); color: #c084fc; background: rgba(168,85,247,0.08); }
    .btn-sm.primary {
      background: linear-gradient(135deg, var(--sol-1), var(--sol-3));
      color: #fff; border: none;
      box-shadow: 0 2px 10px rgba(249,115,22,0.28);
    }
    .btn-sm.primary:hover { opacity: 0.88; }

    textarea {
      width: 100%; min-height: 280px; padding: 14px;
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      font-size: 13px; font-family: var(--font); color: var(--text);
      background: rgba(255,255,255,0.03);
      resize: vertical; outline: none; line-height: 1.75;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus { border-color: var(--sol-3); box-shadow: 0 0 0 3px rgba(236,72,153,0.10); }
    textarea::placeholder { color: var(--text-muted); }

    /* ── History ── */
    .search-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-row input {
      flex: 1; padding: 9px 12px;
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-xs);
      font-size: 13px; outline: none; font-family: var(--font);
      color: var(--text); background: rgba(255,255,255,0.04);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-row input:focus { border-color: var(--sol-3); box-shadow: 0 0 0 3px rgba(236,72,153,0.08); }
    .search-row input::placeholder { color: var(--text-muted); }
    .history-list { list-style: none; max-height: 340px; overflow-y: auto; }
    .history-item {
      padding: 9px 8px; border-radius: var(--radius-xs);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 3px;
      cursor: pointer; transition: background 0.15s;
    }
    .history-item:hover { background: var(--card-hover); }
    .history-item:last-child { border-bottom: none; }
    .history-item-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .history-item-meta { font-size: 11px; color: var(--text-muted); }
    .history-empty { text-align: center; padding: 32px 0; color: var(--text-muted); font-size: 13px; }

    /* ── Summary full ── */
    #summary-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 30px;
      backdrop-filter: blur(20px);
      transition: border-color 0.25s;
    }
    #summary-card:hover { border-color: rgba(168,85,247,0.15); }

    /* ── Summary placeholder ── */
    .summary-placeholder {
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; text-align: center; padding: 32px 0; gap: 10px;
      color: var(--text-muted);
    }
    .summary-placeholder-icon {
      font-size: 42px; line-height: 1;
      background: linear-gradient(135deg, var(--sol-1), var(--sol-3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .summary-placeholder p { font-size: 13px; line-height: 1.7; }

    /* ── Top accent line ── */
    .top-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--sol-1), var(--sol-3), var(--sol-4), transparent);
      position: relative; z-index: 1;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .bottom-grid { grid-template-columns: 1fr; }
      .info-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="top-line"></div>

<!-- Topbar -->
<div class="topbar">
  <a href="/" class="logo">Meeting<span class="logo-sub">.</span>rec</a>
  <div class="topbar-links">
    <a href="/app" class="active">錄音工作台</a>
    <a href="/dashboard">使用量</a>
    <a href="/app/api-keys">API Key</a>
  </div>
  <div class="topbar-right">
    <span class="user-pill" id="user-name">載入中</span>
    <button class="btn-outline-sm" id="logout-btn">登出</button>
  </div>
</div>

<div class="shell">

  <!-- Alert: no API key -->
  <div class="alert-banner no-key" id="alert-no-key">
    ⚠️ 尚未設定 OpenAI API Key，無法使用轉寫功能。 <a href="/app/api-keys">立即設定 →</a>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">
    <div class="status-spinner"></div>
    <span class="status-text" id="status-text">處理中...</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:5%"></div></div>
    <span class="status-progress" id="status-progress">5%</span>
  </div>

  <!-- Hero: Info + Recorder -->
  <div class="hero">

    <!-- Info + Recorder card -->
    <div class="card">
      <span class="section-label">會議資訊</span>
      <div class="info-row">
        <div class="info-field">
          <label>會議主題</label>
          <input type="text" id="meeting-title" placeholder="例如：Q3 產品策略會議" value="">
        </div>
        <div class="info-field">
          <label>與會人員</label>
          <input type="text" id="participants" placeholder="例如：CEO, CTO, PM" value="">
        </div>
      </div>
      <!-- Phase 3: Speaker count + language -->
      <div class="info-row" style="margin-top:8px;">
        <div class="info-field">
          <label>發言者人數</label>
          <select id="speaker-count" style="width:100%;padding:10px 13px;border:1px solid var(--border-bright);border-radius:var(--radius-xs);font-size:13px;font-family:var(--font);color:var(--text);background:rgba(255,255,255,0.04);outline:none;">
            <option value="1">1 人（單人）</option>
            <option value="2" selected>2 人</option>
            <option value="3">3 人</option>
            <option value="4">4 人</option>
            <option value="5">5 人</option>
            <option value="6">6 人</option>
            <option value="8">8 人（多人會議）</option>
          </select>
        </div>
        <div class="info-field">
          <label>音訊語言</label>
          <select id="audio-language" style="width:100%;padding:10px 13px;border:1px solid var(--border-bright);border-radius:var(--radius-xs);font-size:13px;font-family:var(--font);color:var(--text);background:rgba(255,255,255,0.04);outline:none;">
            <option value="zh-TW" selected>繁體中文</option>
            <option value="zh-CN">簡體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="auto">自動偵測</option>
          </select>
        </div>
      </div>

      <div style="margin-top: 4px;">
        <span class="section-label" style="margin-bottom:14px;">錄音控制</span>
        <div class="recorder-body">
          <div class="waveform" id="waveform">
            <script>for(var i=0;i<28;i++){document.write('<div class=wave-bar id=wb'+i+'></div>')}</script>
          </div>
          <div class="timer" id="timer">00:00</div>
          <div class="recorder-controls">
            <button class="btn-rec start" id="btn-start">🎙 開始錄音</button>
            <button class="btn-rec stop" id="btn-stop" style="display:none;">⏹ 停止錄音</button>
            <label class="btn-rec upload" for="upload-file-input">📁 上傳音訊</label>
          </div>
          <input type="file" id="upload-file-input" accept=".webm,.wav,.mp3,.m4a,.ogg">
          <div class="upload-area" id="upload-area">
            <label for="upload-file-input">點擊選擇音訊檔，或拖放到這裡<br><small style="color:var(--text-muted)">支援 WebM, WAV, MP3, M4A, OGG</small></label>
            <div class="upload-filename" id="upload-filename"></div>
            <button class="btn-rec start" id="btn-upload" style="display:none;margin-top:10px;width:100%;">🚀 送出轉寫</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Summary preview card -->
    <div class="card" style="display:flex;flex-direction:column;">
      <span class="section-label">摘要預覽</span>
      <div class="summary-placeholder" id="summary-placeholder">
        <div class="summary-placeholder-icon">📋</div>
        <p>開始錄音並上傳<br>AI 會在這裡自動產生<br>結構化 Meeting Minutes</p>
      </div>
      <div id="summary-result" style="display:none;"></div>
    </div>

  </div>

  <!-- Transcript + History -->
  <div class="bottom-grid">

    <div class="transcript-area">
      <div class="section-header">
        <h2>✍ 逐字稿</h2>
        <div class="section-header-actions">
          <button class="btn-sm" id="btn-copy-transcript">複製</button>
        </div>
      </div>
      <textarea id="transcript-area" placeholder="逐字稿會在這裡顯示。開始錄音或上傳音訊檔即可產生..."></textarea>
    </div>

    <div class="history-card">
      <div class="section-header">
        <h2>📜 歷史記錄</h2>
        <button class="btn-sm" id="btn-clear-history">清除</button>
      </div>
      <div class="search-row">
        <input type="text" id="search-history" placeholder="搜尋會議...">
      </div>
      <ul class="history-list" id="history-list">
        <li class="history-empty">尚無記錄</li>
      </ul>
    </div>

  </div>

  <!-- Summary full view -->
  <div class="transcript-area" id="summary-card" style="display:none;">
    <div class="section-header">
      <h2>📋 會議紀要（Meeting Minutes）</h2>
      <div class="section-header-actions">
        <button class="btn-sm primary" id="btn-copy-summary">複製全文</button>
        <button class="btn-sm" id="btn-export-md">📄 Markdown</button>
        <button class="btn-sm" id="btn-export-pdf">📕 PDF</button>
      </div>
    </div>
    <textarea id="summary-area" readonly style="min-height:200px;"></textarea>
  </div>

</div>

<script>
  // ── Auth check ──
  async function checkAuth() {
    try {
      var res = await fetch('/api/auth/me', { credentials: 'include' });
      if (!res.ok) { window.location.href = '/auth?redirect=/app'; return; }
      var data = await res.json();
      document.getElementById('user-name').textContent = data.user.name || data.user.email.split('@')[0];
    } catch(e) { window.location.href = '/auth?redirect=/app'; }
  }

  async function checkApiKey() {
    try {
      var res = await fetch('/api/user/api-key', { credentials: 'include' });
      if (res.ok) {
        var d = await res.json();
        if (!d.has_api_key) {
          document.getElementById('alert-no-key').classList.add('show');
        }
      }
    } catch(e) {}
  }

  checkAuth();
  checkApiKey();

  // ── Logout ──
  document.getElementById('logout-btn').addEventListener('click', async function() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/';
  });

  // ── Waveform ──
  var waveInterval;
  function startWave() {
    clearInterval(waveInterval);
    waveInterval = setInterval(function() {
      for (var i = 0; i < 28; i++) {
        var bar = document.getElementById('wb' + i);
        if (bar) {
          bar.style.height = (14 + Math.random() * 44) + 'px';
          bar.classList.add('active');
        }
      }
    }, 110);
  }
  function stopWave() {
    clearInterval(waveInterval);
    for (var i = 0; i < 28; i++) {
      var bar = document.getElementById('wb' + i);
      if (bar) { bar.style.height = '20px'; bar.classList.remove('active'); }
    }
  }

  // ── Timer ──
  var timerStart = null, timerInterval = null;
  function startTimer() {
    timerStart = Date.now();
    timerInterval = setInterval(function() {
      var secs = Math.floor((Date.now() - timerStart) / 1000);
      var m = String(Math.floor(secs / 60)).padStart(2, '0');
      var s = String(secs % 60).padStart(2, '0');
      document.getElementById('timer').textContent = m + ':' + s;
    }, 1000);
  }
  function stopTimer() { clearInterval(timerInterval); }
  function resetTimer() {
    stopTimer();
    document.getElementById('timer').textContent = '00:00';
    document.getElementById('timer').classList.remove('recording');
  }

  // ── Browser recording ──
  var mediaRecorder = null, audioChunks = [];

  document.getElementById('btn-start').addEventListener('click', async function() {
    try {
      var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      audioChunks = [];
      mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = function() {
        var blob = new Blob(audioChunks, { type: 'audio/webm' });
        document.getElementById('upload-filename').textContent = '錄音_' + new Date().toLocaleTimeString('zh-TW') + '.webm';
        document.getElementById('upload-area').classList.add('show');
        var btnUpload = document.getElementById('btn-upload');
        btnUpload.style.display = 'inline-block';
        btnUpload.dataset.blob = blob;
        stream.getTracks().forEach(function(t) { t.stop(); });
      };
      mediaRecorder.start(100);
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-stop').style.display = 'inline-block';
      document.getElementById('timer').classList.add('recording');
      startTimer();
      startWave();
    } catch(err) {
      alert('無法存取麥克風，請確認瀏覽器權限已開啟。');
    }
  });

  document.getElementById('btn-stop').addEventListener('click', function() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'none';
    stopTimer();
    stopWave();
  });

  // ── File upload ──
  var fileInput = document.getElementById('upload-file-input');
  var uploadArea = document.getElementById('upload-area');
  var filenameDisplay = document.getElementById('upload-filename');
  var btnUpload = document.getElementById('btn-upload');

  fileInput.addEventListener('change', function() {
    var file = fileInput.files[0];
    if (!file) return;
    filenameDisplay.textContent = file.name;
    uploadArea.classList.add('show');
    btnUpload.style.display = 'inline-block';
    var reader = new FileReader();
    reader.onload = function(e) { btnUpload.dataset.file = e.target.result; };
    reader.readAsDataURL(file);
  });

  var uploadLabel = uploadArea.querySelector('label');
  uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadLabel.style.borderColor = 'var(--sol-4)'; });
  uploadArea.addEventListener('dragleave', function() { uploadLabel.style.borderColor = 'var(--border-bright)'; });
  uploadArea.addEventListener('drop', function(e) {
    e.preventDefault();
    uploadLabel.style.borderColor = 'var(--border-bright)';
    var file = e.dataTransfer.files[0];
    if (file) {
      fileInput.files = e.dataTransfer.files;
      filenameDisplay.textContent = file.name;
      uploadArea.classList.add('show');
      btnUpload.style.display = 'inline-block';
      var reader = new FileReader();
      reader.onload = function(ev) { btnUpload.dataset.file = ev.target.result; };
      reader.readAsDataURL(file);
    }
  });

  btnUpload.addEventListener('click', async () => {
    let blob = null, filename = 'audio.webm';
    if (btnUpload.dataset.blob) {
      // Recorded audio (stored as base64 data URL)
      blob = new Blob([Uint8Array.from(atob(btnUpload.dataset.blob.split(',')[1]), c => c.charCodeAt(0))], { type: 'audio/webm' });
      filename = 'recording_' + new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-') + '.webm';
    } else if (btnUpload.dataset.file) {
      // Uploaded file (stored as base64 data URL) — determine MIME type from extension
      const dataUrl = btnUpload.dataset.file;
      const rawExt = (fileInput.files[0]?.name || 'audio.webm').split('.').pop().toLowerCase();
      const mimeMap = { webm: 'audio/webm', wav: 'audio/wav', mp3: 'audio/mpeg', m4a: 'audio/mp4', ogg: 'audio/ogg' };
      const mime = mimeMap[rawExt] || 'audio/webm';
      const b64 = dataUrl.split(',')[1];
      blob = new Blob([Uint8Array.from(atob(b64), c => c.charCodeAt(0))], { type: mime });
      filename = fileInput.files[0]?.name || ('audio.' + rawExt);
    } else if (fileInput.files[0]) {
      // Fallback: use file input directly
      blob = fileInput.files[0];
      filename = blob.name;
    }
    if (!blob) { alert('請先選擇檔案或錄製音訊'); return; }
    await submitTranscription(blob, filename);
  });

  // ── Transcription ──
  async function submitTranscription(audioBlob, filename) {
    var title = document.getElementById('meeting-title').value.trim() || '未命名會議';
    var participants = document.getElementById('participants').value.trim() || '未填寫';
    showStatus('正在上傳並排程轉寫任務...', 5);

    try {
      var formData = new FormData();
      formData.append('file', audioBlob, filename);
      formData.append('meeting_title', title);
      formData.append('participants', participants);
      formData.append('speaker_count', document.getElementById('speaker-count').value);
      formData.append('language', document.getElementById('audio-language').value);

      var res = await fetch('/api/transcribe', {
        method: 'POST',
        credentials: 'include',
        body: formData,
      });
      var data = await res.json();
      if (!res.ok) {
        if (res.status === 403) {
          hideStatus();
          document.getElementById('alert-no-key').classList.add('show');
          alert('請先設定 OpenAI API Key：' + (data.detail || ''));
          return;
        }
        if (res.status === 429) {
          hideStatus();
          alert('已超過本月用量上限，請等到下個月或升級方案。');
          return;
        }
        throw new Error(data.detail || '轉寫請求失敗');
      }
      pollJob(data.job_id);
    } catch(err) {
      hideStatus();
      alert('錯誤：' + err.message);
    }
  }

  function pollJob(jobId) {
    showStatus('排程成功，等待處理...', 10);
    var attempts = 0;
    var poll = setInterval(async function() {
      attempts++;
      try {
        var res = await fetch('/api/jobs/' + jobId, { credentials: 'include' });
        if (!res.ok) return;
        var job = await res.json();
        updateStatus(job.status === 'processing' ? '處理中...' : job.status === 'completed' ? '完成' : '失敗', job.progress || 10);
        if (job.status === 'completed') {
          clearInterval(poll);
          hideStatus();
          displayResult(job);
        } else if (job.status === 'failed') {
          clearInterval(poll);
          hideStatus();
          alert('轉寫失敗：' + (job.error || '未知錯誤'));
        }
      } catch(e) {}
      if (attempts > 120) clearInterval(poll);
    }, 2000);
  }

  function showStatus(text, progress) {
    var bar = document.getElementById('status-bar');
    bar.classList.add('show');
    document.getElementById('status-text').textContent = text;
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('status-progress').textContent = progress + '%';
  }
  function updateStatus(text, progress) {
    document.getElementById('status-text').textContent = text;
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('status-progress').textContent = progress + '%';
  }
  function hideStatus() { document.getElementById('status-bar').classList.remove('show'); }

  function displayResult(job) {
    document.getElementById('transcript-area').value = job.transcript || '';
    document.getElementById('summary-area').value = job.summary || '';
    document.getElementById('summary-card').style.display = 'block';
    document.getElementById('summary-placeholder').style.display = 'none';

    var history = JSON.parse(localStorage.getItem('mr_history') || '[]');
    history.unshift({
      id: job.job_id,
      title: job.meeting_title,
      participants: job.participants,
      transcript: job.transcript,
      summary: job.summary,
      date: new Date().toISOString(),
    });
    localStorage.setItem('mr_history', JSON.stringify(history.slice(0, 50)));
    renderHistory();
    renderSharePanel(job);
  }

  function buildMeetingMarkdown(job) {
    var title = job.meeting_title || '未命名會議';
    var participants = job.participants || '未填寫';
    var transcript = job.transcript || '';
    var summary = job.summary || '';
    var date = new Date().toLocaleDateString('zh-TW');
    var md = '# ' + title + '｜Meeting Minutes\n\n';
    md += '> 與會人員：' + participants + ' | 記錄日期：' + date + '\n\n';
    md += '---\n\n';
    md += '## 會議紀要\n\n' + (summary || '(無)') + '\n\n';
    md += '---\n\n## 逐字稿\n\n' + (transcript || '(無)') + '\n';
    return md;
  }

  function getShareStore() {
    try {
      return JSON.parse(localStorage.getItem('mr_shared_notes') || '{}');
    } catch (e) {
      return {};
    }
  }

  function saveShareRecord(payload) {
    var store = getShareStore();
    store[payload.shareId] = payload;
    localStorage.setItem('mr_shared_notes', JSON.stringify(store));
    // Also POST to backend for persistence (optional, fails gracefully)
    fetch('/api/share', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function() {});
  }

  function renderSharePanel(job) {
    var card = document.getElementById('share-card');
    var urlEl = document.getElementById('share-url');
    if (!card || !urlEl) return;
    card.style.display = 'block';
    var shareId = 'mr_' + (job.job_id || Date.now());
    var payload = {
      shareId: shareId,
      title: job.meeting_title || '未命名會議',
      participants: job.participants || '未填寫',
      transcript: job.transcript || '',
      summary: job.summary || '',
      createdAt: new Date().toISOString(),
    };
    saveShareRecord(payload);
    // Encode full payload in URL hash so share.html works without API call
    var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload)))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    urlEl.value = window.location.origin + '/share.html#' + shareId + '?d=' + encoded;
    document.getElementById('btn-copy-share').onclick = function() {
      navigator.clipboard.writeText(urlEl.value);
      this.textContent = '已複製';
      var btn = this;
      setTimeout(function() { btn.textContent = '複製連結'; }, 1500);
    };
  }

  function exportMarkdown(job) {
    var md = buildMeetingMarkdown(job);
    var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (job.meeting_title || '未命名會議').replace(/[^\w\u4e00-\u9fa5]/g, '_') + '_會議紀要.md';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── History ──
  function renderHistory(filter) {
    filter = filter || '';
    var history = JSON.parse(localStorage.getItem('mr_history') || '[]');
    var list = document.getElementById('history-list');
    var q = filter.toLowerCase();
    var filtered = history.filter(function(h) {
      return !q || (h.title && h.title.toLowerCase().includes(q)) || (h.participants && h.participants.toLowerCase().includes(q));
    });
    if (!filtered.length) {
      list.innerHTML = '<li class="history-empty">尚無記錄</li>';
      return;
    }
    list.innerHTML = filtered.map(function(h) {
      return '<li class="history-item" onclick="loadHistory(\'' + h.id + '\')">' +
        '<span class="history-item-title">' + (h.title || '未命名') + '</span>' +
        '<span class="history-item-meta">' + (h.participants || '') + ' · ' + new Date(h.date).toLocaleDateString('zh-TW') + '</span>' +
        '</li>';
    }).join('');
  }

  window.loadHistory = function(id) {
    var history = JSON.parse(localStorage.getItem('mr_history') || '[]');
    var h = null;
    for (var i = 0; i < history.length; i++) { if (history[i].id == id) { h = history[i]; break; } }
    if (!h) return;
    document.getElementById('meeting-title').value = h.title || '';
    document.getElementById('participants').value = h.participants || '';
    document.getElementById('transcript-area').value = h.transcript || '';
    document.getElementById('summary-area').value = h.summary || '';
    document.getElementById('summary-card').style.display = h.summary ? 'block' : 'none';
    document.getElementById('summary-placeholder').style.display = h.summary ? 'none' : 'flex';
  };

  document.getElementById('search-history').addEventListener('input', function(e) { renderHistory(e.target.value); });
  document.getElementById('btn-clear-history').addEventListener('click', function() {
    if (confirm('確定清除所有本地記錄？')) {
      localStorage.removeItem('mr_history');
      renderHistory();
    }
  });

  // ── Copy ──
  document.getElementById('btn-copy-transcript').addEventListener('click', function() {
    navigator.clipboard.writeText(document.getElementById('transcript-area').value);
    this.textContent = '已複製!';
    var self = this;
    setTimeout(function() { self.textContent = '複製'; }, 1500);
  });
  document.getElementById('btn-copy-summary').addEventListener('click', function() {
    navigator.clipboard.writeText(document.getElementById('summary-area').value);
    this.textContent = '已複製!';
    var self = this;
    setTimeout(function() { self.textContent = '複製全文'; }, 1500);
  });

  // ── Phase 3: Multi-format Export ──
  document.getElementById('btn-export-md').addEventListener('click', function() {
    exportMarkdown({
      meeting_title: document.getElementById('meeting-title').value || '未命名會議',
      participants: document.getElementById('participants').value || '未填寫',
      transcript: document.getElementById('transcript-area').value,
      summary: document.getElementById('summary-area').value,
    });
  });

  document.getElementById('btn-export-pdf').addEventListener('click', function() {
    var title = document.getElementById('meeting-title').value || '未命名會議';
    var summary = document.getElementById('summary-area').value || '';
    var transcript = document.getElementById('transcript-area').value || '';
    var participants = document.getElementById('participants').value || '未填寫';
    var date = new Date().toLocaleDateString('zh-TW');

    try {
      var jsPDF = window.jspdf && window.jspdf.jsPDF;
      if (!jsPDF) {
        alert('PDF 函式庫載入中，請稍後再試，或使用 Markdown 匯出。');
        return;
      }
      var doc = new jsPDF();
      var pageW = doc.internal.pageSize.getWidth();
      var margin = 20;
      var lineHeight = 7;
      var y = margin;
      var maxY = doc.internal.pageSize.getHeight() - margin;

      function addPage() {
        doc.addPage();
        y = margin;
      }
      function checkPage(needed) {
        if (y + needed > maxY) { addPage(); }
      }
      function wrapText(text, maxW) {
        var lines = doc.splitTextToSize(text, maxW - margin * 2);
        for (var i = 0; i < lines.length; i++) {
          checkPage(lineHeight);
          doc.setFontSize(10);
          doc.setTextColor(80);
          doc.text(lines[i], margin, y);
          y += lineHeight;
        }
      }

      // Header
      doc.setFontSize(20);
      doc.setTextColor(30);
      doc.setFont(undefined, 'bold');
      doc.text(title, margin, y);
      y += 10;

      doc.setFontSize(10);
      doc.setTextColor(140);
      doc.setFont(undefined, 'normal');
      doc.text('與會人員：' + participants + '　｜　記錄日期：' + date, margin, y);
      y += 12;

      // Divider
      doc.setDrawColor(220);
      doc.line(margin, y, pageW - margin, y);
      y += 10;

      // Summary section
      doc.setFontSize(14);
      doc.setTextColor(30);
      doc.setFont(undefined, 'bold');
      doc.text('Meeting Minutes', margin, y);
      y += 8;

      doc.setFontSize(10);
      doc.setFont(undefined, 'normal');
      doc.setTextColor(60);
      wrapText(summary || '(無)', pageW);
      y += 6;

      // Divider
      checkPage(10);
      doc.setDrawColor(220);
      doc.line(margin, y, pageW - margin, y);
      y += 10;

      // Transcript
      doc.setFontSize(14);
      doc.setTextColor(30);
      doc.setFont(undefined, 'bold');
      doc.text('逐字稿', margin, y);
      y += 8;

      doc.setFontSize(9);
      doc.setFont(undefined, 'normal');
      doc.setTextColor(60);
      wrapText(transcript || '(無)', pageW);

      var filename = title.replace(/[^\w\u4e00-\u9fa5]/g, '_') + '_會議紀要.pdf';
      doc.save(filename);
    } catch(e) {
      console.error('PDF export error:', e);
      alert('PDF 匯出失敗，請嘗試使用 Markdown 匯出。');
    }
  });

  // ── Share panel ──
  (function initSharePanel() {
    var existing = document.getElementById('summary-card');
    if (!existing) return;
    var shareHtml = '\n  <div class="transcript-area" id="share-card" style="display:none;">\n    <div class="section-header">\n      <h2>🔗 唯讀分享</h2>\n      <div class="section-header-actions">\n        <button class="btn-sm primary" id="btn-copy-share">複製連結</button>\n      </div>\n    </div>\n    <input id="share-url" readonly style="width:100%;padding:12px 14px;border:1px solid var(--border-bright);border-radius:var(--radius-xs);background:rgba(255,255,255,0.03);color:var(--text);font-size:13px;">\n    <p style="margin-top:10px;color:var(--text-muted);font-size:12px;line-height:1.6;">連結會指向本機唯讀頁，方便快速分享會議紀錄。正式多人分享版可再接 Supabase。 </p>\n  </div>';
    existing.insertAdjacentHTML('afterend', shareHtml);
  })();

  // ── Init ──
  renderHistory();
</script>

</body>
</html>
